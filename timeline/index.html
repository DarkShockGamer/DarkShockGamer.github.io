<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build Season Timeline</title>
  <meta name="description" content="Interactive Build Season Timeline with draggable activity bars." />

  <!-- The page pulls its colors from CSS variables. Set these globally in your site to match your theme. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Replace with your font(s) or remove if your theme already sets fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./timeline.css" />
</head>
<body>
  <header class="header">
    <h1 class="title">Build Season Timeline</h1>
    <div class="header-actions">
      <button id="resetBtn" class="btn ghost" title="Reset to defaults">Reset</button>
      <button id="exportJsonBtn" class="btn ghost" title="Export as JSON">Export JSON</button>
      <button id="exportPngBtn" class="btn ghost" title="Export as PNG">Export PNG</button>
    </div>
  </header>

  <main class="page">
    <section class="legend">
      <div class="legend-grid">
        <div class="legend-item">
          <span class="chip chip-accent"></span>
          <span>Active work</span>
        </div>
        <div class="legend-item">
          <span class="chip chip-muted"></span>
          <span>Idle buffer</span>
        </div>
        <div class="legend-item">
          <span class="chip chip-handle"></span>
          <span>Resize handles</span>
        </div>
      </div>
      <p class="subtle">Tip: drag bars to move; drag handles to resize; double-click a bar to edit the label.</p>
    </section>

    <section class="board-container">
      <div class="board" id="timelineBoard" aria-label="Interactive build season timeline">
        <!-- Week header row -->
        <div class="board-row board-header" role="row">
          <div class="cell cell-activity-head" role="columnheader">ACTIVITY</div>
          <!-- Week columns injected by JS -->
        </div>
        <!-- Activity rows injected by JS -->
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="save-indicator" id="saveIndicator" aria-live="polite">Saved</div>
  </footer>

  <script src="./timeline.js"></script>
</body>
</html>
